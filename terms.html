  <meta charset="UTF-8">

  <style>
    .policy-meta {
      color: #6b7280;
      font-size: 0.95rem;
      margin: 0 0 18px;
    }
    .policy-filter {
      margin: 0 0 18px;
      padding: 14px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
    }
    .policy-filter-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }
    .policy-filter-search {
      flex: 1 1 280px;
      min-width: 220px;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 0.95rem;
    }
    .policy-filter-actions {
      display: inline-flex;
      gap: 8px;
    }
    .policy-filter-action {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #fff;
      padding: 8px 12px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .policy-filter-action:hover {
      background: #f3f4f6;
    }
    .policy-filter-label {
      margin: 0 0 10px;
      font-weight: 700;
      color: #374151;
    }
    .policy-filter-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .policy-filter-option {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      background: #f9fafb;
      cursor: pointer;
      user-select: none;
    }
    .policy-filter-option input {
      margin: 0;
    }
    #policy-root {
      max-width: 920px;
    }
    #policy-root h2 {
      margin-top: 28px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e5e7eb;
    }
    .policy-body {
      padding-left: 0;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 8px 22px rgba(17, 24, 39, 0.06);
    }
    .policy-body h3 {
      margin: 0 0 8px;
      color: var(--primary);
      font-size: 1.05rem;
    }
    .policy-body h3:not(:first-child) {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
    }
    .policy-body p {
      margin: 0 0 10px;
      line-height: 1.75;
    }
    .policy-body ul {
      margin: 6px 0 10px;
      padding-left: 20px;
    }
    .policy-body ol {
      margin: 6px 0 10px;
      padding-left: 20px;
    }
    .policy-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0 12px;
      font-size: 0.95rem;
    }
    .policy-body th,
    .policy-body td {
      border: 1px solid #d1d5db;
      text-align: left;
      vertical-align: top;
      padding: 10px;
    }
    .policy-body th {
      background: #f9fafb;
      font-weight: 700;
    }
    .policy-separator {
      margin: 26px 0;
      border: 0;
      border-top: 1px solid #d1d5db;

<body class="card-emphasis-page">
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">
        <img class="logo-mark" src="photoes/app_icon.png" alt="青学ペイ ロゴ">
        <span class="logo-text">青学ペイ</span>
      </a>
      <!-- ナビには追加しない -->
      <nav class="global-nav" aria-label="メインナビゲーション">
        <a href="index.html" class="nav-item">ホーム</a>
        <a href="for-merchants.html" class="nav-item">加盟を検討中の方へ</a>
        <a href="for-staff.html" class="nav-item">教職員の方へ</a>
      </nav>
      <button class="menu-toggle" aria-expanded="false" aria-label="メニュー">☰</button>
    </div>
  </header>
  <main>
    <section class="container page-section-top">
      <h1>利用規約・プライバシーポリシー</h1>
      <p class="section-lead">青学ペイのご利用前に、以下の内容をご確認ください。</p>
      <p class="policy-meta">最終更新日: <span id="policy-updated-at"></span></p>
      <div id="policy-filter" class="policy-filter"></div>
      <div id="policy-root"></div>
    </section>
  </main>
  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-left">
        <small><a href="members.html" class="footer-link">&copy; <span id="year"></span> Azul</a></small>
      </div>
      <div class="footer-center">
        <a href="https://forms.gle/uufPVv7yxR5w3acG6" class="footer-link">フィードバックを送る</a>
      </div>
      <div class="footer-right">
        <a href="terms.html" class="footer-link">利用規約・プライバシーポリシー</a>
      </div>
    </div>
  </footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const toggle = document.querySelector('.menu-toggle');
    const nav = document.querySelector('.global-nav');
    toggle.addEventListener('click', () => {
      const expanded = toggle.getAttribute('aria-expanded') === 'true';
      toggle.setAttribute('aria-expanded', String(!expanded));
      nav.classList.toggle('open');
    });
  </script>
  <script src="assets/policy-data.js"></script>
  <script src="assets/policy-renderer.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const policyData = window.AOGAKU_POLICY_DATA || {};
    const allowedCategories = Array.isArray(policyData.filterCategories)
      ? policyData.filterCategories
      : [];
    const initialSelectedCategories = params.getAll("category")
      .filter(category => allowedCategories.includes(category));
    const initialKeyword = params.get("q") || "";

    renderAogakuPolicy({
      mode: "full",
      mountId: "policy-root",
      updatedAtId: "policy-updated-at",
      filterContainerId: "policy-filter",
      filterCategories: allowedCategories,
      initialSelectedCategories,
      initialKeyword
    });
  </script>
